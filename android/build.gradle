plugins {
    id "com.android.application" version "8.7.0" apply false
    id "com.android.library"    version "8.7.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.24" apply false
    id "com.google.gms.google-services" version "4.4.2" apply false
    // Do NOT apply dev.flutter plugin here; it is applied in the app module.
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }

    configurations.configureEach {
        resolutionStrategy {
            force "androidx.health.connect:connect-client:1.0.0-alpha11"
        }
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

// Fallback namespace for plugins that still rely on AndroidManifest package.
// This avoids editing files under Pub cache on every clean/pub get.
subprojects { subproject ->
    subproject.plugins.withId("com.android.library") {
        if (subproject.name == "flutter_health_connect") {
            def androidExt = subproject.extensions.findByName("android")
            if (androidExt != null && androidExt.hasProperty("namespace") && androidExt.namespace == null) {
                androidExt.namespace = "dev.duynp.flutter_health_connect"
            }
        }
    }
}

rootProject.ext.flutter = [
    compileSdkVersion: 35,
    minSdkVersion: 23,
    targetSdkVersion: 35
]

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
