plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def googleServicesJson = file("google-services.json")
if (googleServicesJson.exists()) {
    apply plugin: "com.google.gms.google-services"
} else {
    logger.lifecycle("google-services.json not found. Skipping Firebase Google Services plugin for now.")
}

android {
    namespace = "com.rdib.pulsewise"
    // compileSdk = flutter.compileSdkVersion
    // ndkVersion = flutter.ndkVersion
    compileSdk = 35
    // ndkVersion = "26.1.10909125"
    // ndkVersion = "27.0.12077973"
    ndkVersion = "29.0.14206865"


    compileOptions {
        // sourceCompatibility = JavaVersion.VERSION_1_8
        // targetCompatibility = JavaVersion.VERSION_1_8
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        // jvmTarget = JavaVersion.VERSION_1_8
        jvmTarget = "17"
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.rdib.pulsewise"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 26
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // Keep release optimizations, but sign with the default Android debug
            // keystore so local release APKs behave like debug for Google Sign-In.
            signingConfig = signingConfigs.debug
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Keep Kotlin libs aligned with the Kotlin Gradle plugin version used at the project level.
    // 1.9.24 works well with AGP 8.5.x; adjust only if your top-level uses another.
    implementation platform("org.jetbrains.kotlin:kotlin-bom:1.9.24")
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8"

    // flutter_health_connect references SleepStageRecord, available in 1.0.0-alpha11.
    implementation "androidx.health.connect:connect-client:1.0.0-alpha11"

    // If you enabled desugaring above, also add:
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
}
