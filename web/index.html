  <style>
    .cropper-crop-box,

    .cropper-crop-box {

  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #FFFFFF;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }

<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>

  <script>
    (function () {
      if (window.pulseWisePwaInstallBridge) {
        return;
      }

      var bridge = {
        deferredPrompt: null,
        installed: false,
        setPrompt: function (event) {
          if (event && typeof event.preventDefault === 'function') {
            event.preventDefault();
          }
          bridge.deferredPrompt = event;
          window.dispatchEvent(new CustomEvent('pulsewise_pwa_prompt_ready'));
        },
        clearPrompt: function () {
          bridge.deferredPrompt = null;
        },
        markInstalled: function () {
          bridge.installed = true;
          bridge.deferredPrompt = null;
          window.dispatchEvent(new CustomEvent('pulsewise_pwa_installed'));
        },
      };

      window.pulseWisePwaInstallBridge = bridge;
      window.addEventListener('beforeinstallprompt', bridge.setPrompt);
      window.addEventListener('appinstalled', bridge.markInstalled);
    })();
  </script>
  
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('firebase-messaging-sw.js', {
          scope: '/firebase-cloud-messaging-push-scope',
        });
      });
    }
  </script>
