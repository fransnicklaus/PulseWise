<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Melanjutkan Login Google...</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fff7f8;
        color: #536278;
        font-family: Arial, sans-serif;
      }

      .message {
        padding: 24px;
        text-align: center;
        font-size: 16px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="message">Melanjutkan login Google ke PulseWise...</div>
    <script>
      (function () {
        var resultKey = 'pulsewise_google_redirect_result';
        var resultIdTokenKey = 'pw_google_id_token';
        var resultErrorKey = 'pw_google_error';
        var allowedOrigins = [
          'https://pulsewise.algoritme.tech',
          'https://pulsewisetest.vercel.app',
        ];

        function parseHashParameters() {
          var hash = window.location.hash || '';
          var normalized = hash.charAt(0) === '#' ? hash.slice(1) : hash;
          return new URLSearchParams(normalized);
        }

        function decodeBase64Url(value) {
          if (!value) {
            return null;
          }

          var normalized = value.replace(/-/g, '+').replace(/_/g, '/');
          while (normalized.length % 4 !== 0) {
            normalized += '=';
          }

          try {
            return atob(normalized);
          } catch (_) {
            return null;
          }
        }

        function decodeStatePayload(rawState) {
          var decoded = decodeBase64Url(rawState);
          if (!decoded) {
            return null;
          }

          try {
            return JSON.parse(decoded);
          } catch (_) {
            return null;
          }
        }

        function decodeJwtPayload(token) {
          var parts = token.split('.');
          if (parts.length < 2) {
            return null;
          }

          var encoded = parts[1].replace(/-/g, '+').replace(/_/g, '/');
          while (encoded.length % 4 !== 0) {
            encoded += '=';
          }

          try {
            return JSON.parse(atob(encoded));
          } catch (_) {
            return null;
          }
        }

        function storeResult(payload) {
          localStorage.setItem(resultKey, JSON.stringify(payload));
        }

        function resolveReturnUrl(statePayload) {
          var fallback = window.location.origin + '/login';
          var candidate = statePayload && statePayload.returnUrl
            ? String(statePayload.returnUrl)
            : fallback;

          try {
            var parsed = new URL(candidate);
            if (allowedOrigins.indexOf(parsed.origin) !== -1) {
              return parsed.toString();
            }
          } catch (_) {}

          return fallback;
        }

        function buildReturnUrl(returnUrl, payload) {
          var target = new URL(returnUrl);
          var hashParams = new URLSearchParams();

          if (payload && payload.idToken) {
            hashParams.set(resultIdTokenKey, payload.idToken);
          }

          if (payload && payload.error) {
            hashParams.set(resultErrorKey, payload.error);
          }

          target.hash = hashParams.toString();
          return target.toString();
        }

        function redirectBack(returnUrl, payload) {
          var targetUrl = buildReturnUrl(returnUrl, payload);
          window.setTimeout(function () {
            window.location.replace(targetUrl);
          }, 250);
        }

        var params = parseHashParameters();
        var statePayload = decodeStatePayload(params.get('state'));
        var returnUrl = resolveReturnUrl(statePayload);
        var expectedNonce =
          statePayload && statePayload.nonce ? String(statePayload.nonce) : '';

        var error = params.get('error');
        var errorDescription = params.get('error_description');
        if (error) {
          var authError =
            'Login Google gagal: ' +
            (errorDescription || error).replace(/\+/g, ' ');
          storeResult({ error: authError });
          redirectBack(returnUrl, { error: authError });
          return;
        }

        if (!expectedNonce) {
          var stateError = 'Status login Google tidak valid. Silakan coba lagi.';
          storeResult({ error: stateError });
          redirectBack(returnUrl, { error: stateError });
          return;
        }

        var idToken = params.get('id_token');
        if (!idToken) {
          var tokenError = 'ID token Google tidak ditemukan pada redirect login.';
          storeResult({ error: tokenError });
          redirectBack(returnUrl, { error: tokenError });
          return;
        }

        var payload = decodeJwtPayload(idToken);
        if (!payload || !payload.nonce || payload.nonce !== expectedNonce) {
          var nonceError = 'Nonce login Google tidak valid. Silakan coba lagi.';
          storeResult({ error: nonceError });
          redirectBack(returnUrl, { error: nonceError });
          return;
        }

        storeResult({ idToken: idToken });
        redirectBack(returnUrl, { idToken: idToken });
      })();
    </script>
  </body>
</html>
